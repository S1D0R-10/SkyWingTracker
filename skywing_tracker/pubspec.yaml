name: skywing_tracker
description: Advanced pigeon flight tracking and analytics app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.6

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.7

  # Maps
  google_maps_flutter: ^2.9.0

  # Charts
  fl_chart: ^0.69.0

  # Local Storage
  hive_flutter: ^1.1.0

  # Image
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # Notifications
  firebase_core: ^3.4.1
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Network
  http: ^1.2.2
  connectivity_plus: ^6.0.5

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2

  # UI
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
        - asset: assets/fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 500
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 600
        - asset: assets/fonts/Inter-Variable.ttf
          weight: 700
